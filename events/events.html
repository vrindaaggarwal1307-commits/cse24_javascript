<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>MOUSE EVENTS</h2>
    <button onclick="onClick()">Click Me</button>
    <button onmouseover="onMouseOver()">Hover Me</button>
    <button onmouseout="onMouseOut()">Leave Me</button>
    <button onmousedown="onMouseDown()">Mouse Down</button>
    <button onmouseup="onMouseUp()">Mouse Up</button>
    <button onmousemove="onMouseMove()">Move Mouse</button>

</body>
</html>
